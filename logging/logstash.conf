input {
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # Add timestamp parsing if required, or keep the existing JSON fields
  mutate {
    add_field => { "source" => "flask-app" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "polaris-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
