apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris-deployment
  labels:
    app: polaris
spec:
  replicas: 2
  selector:
    matchLabels:
      app: polaris
  template:
    metadata:
      labels:
        app: polaris
    spec:
      containers:
      - name: polaris-app
        image: project-polaris:latest
        imagePullPolicy: Never # Configured for local minikube / dev registry testing
        ports:
        - containerPort: 5006
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
